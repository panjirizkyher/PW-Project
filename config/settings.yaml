mode: live
confirm_live_manually: true
exchange:
  id: binance
  symbol: BTC/USDT
  timeframe: 1h
api_keys:
  demo:
    key_env: EXCHANGE_DEMO_KEY
    secret_env: EXCHANGE_DEMO_SECRET
  live:
    key_env: EXCHANGE_LIVE_KEY
    secret_env: EXCHANGE_LIVE_SECRET
risk:
  account_balance: 10000.0
  risk_per_trade_pct: 5.0
  max_daily_loss_pct: 10.0
  min_reward_risk_ratio: 2.0
  max_open_positions: 8
  max_total_exposure_pct: 40.0
  max_hold_bars: 200
signal:
  strategy: rsi_mean_reversion_plus_breakout
  rsi_period: 14
  rsi_oversold: 50.0
  rsi_overbought: 70.0
  target_reward_risk_ratio: 2.5
  breakout_bars: 20
llm:
  base_url: https://inference.nousresearch.com/v1
  model: tencent/hy3:free
  api_key_env: LLM_API_KEY
  temperature: 0.3
  enabled: true
telegram:
  enabled: false
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID
dashboard:
  port: 8731
  refresh_seconds: 1
price_feed:
  refresh_seconds: 5
schedule:
  run_every_minutes: 5
confirm_live_manual: false
