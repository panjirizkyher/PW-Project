mode: demo
confirm_live_manually: true
exchange:
  id: binance
  symbol: BTC/USDT
  timeframe: 1h
api_keys:
  demo:
    key_env: EXCHANGE_DEMO_KEY
    secret_env: EXCHANGE_DEMO_SECRET
  live:
    key_env: EXCHANGE_LIVE_KEY
    secret_env: EXCHANGE_LIVE_SECRET
risk:
  account_balance: 10000.0
  risk_per_trade_pct: 1.0
  max_daily_loss_pct: 3.0
  min_reward_risk_ratio: 2.0
  max_open_positions: 3
  max_total_exposure_pct: 10.0
  max_hold_bars: 48
signal:
  strategy: rsi_mean_reversion
  rsi_period: 14
  rsi_oversold: 42.0
  rsi_overbought: 65.0
  target_reward_risk_ratio: 2.5
llm:
  base_url: https://inference.nousresearch.com/v1
  model: tencent/hy3:free
  api_key_env: LLM_API_KEY
  temperature: 0.3
  enabled: true
telegram:
  enabled: false
  bot_token_env: TELEGRAM_BOT_TOKEN
  chat_id_env: TELEGRAM_CHAT_ID
dashboard:
  port: 8000
  refresh_seconds: 4
price_feed:
  refresh_seconds: 5
schedule:
  run_every_minutes: 60
